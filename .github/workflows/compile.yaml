name: Convert YAML → MRS for Mihomo

on:
  push:
    paths:
      - 'my-domen/*.yaml'
      - 'my-domen/*.yml'
  workflow_dispatch:  # можно запустить вручную

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get latest Mihomo version
        id: version
        run: |
          VER=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
                | grep '"tag_name"' | cut -d'"' -f4 | sed 's/v//')
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "Using Mihomo v$VER"

      - name: Download & setup Mihomo
        run: |
          wget -q "https://github.com/MetaCubeX/mihomo/releases/download/v${{ steps.version.outputs.ver }}/mihomo-linux-amd64-compatible-v${{ steps.version.outputs.ver }}.gz" -O mihomo.gz
          gzip -d mihomo.gz
          chmod +x mihomo
          echo "Mihomo version check:"
          ./mihomo version

      - name: Convert all YAML to MRS (domain behavior)
        run: |
          shopt -s nullglob
          for file in my-domen/*.yaml my-domen/*.yml; do
            if [[ -f "$file" ]]; then
              base="${file%.*}"
              echo "::group::🔄 Converting $file → ${base}.mrs"
              ./mihomo convert-ruleset domain yaml "$file" "${base}.mrs"
              echo "✅ Created ${base}.mrs"
              echo "::endgroup::"
            fi
          done

      - name: Auto-commit .mrs files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(mrs): regenerate compiled rule-sets from YAML'
          file_pattern: 'my-domen/*.mrs'
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          skip_dirty_check: false
